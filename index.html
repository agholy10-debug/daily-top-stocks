<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日熱門股票前五名 - 金鑫體系</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4f8; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .input-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .rank-badge {
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; color: white;
        }
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .rank-2 { background: linear-gradient(135deg, #9ca3af, #6b7280); }
        .rank-3 { background: linear-gradient(135deg, #b45309, #92400e); }
        .rank-4 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .rank-5 { background: linear-gradient(135deg, #10b981, #059669); }
        .history-row:hover { background: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .btn-primary {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white; padding: 12px 32px; border-radius: 12px;
            font-weight: 600; border: none; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.3); }
        .btn-delete {
            color: #ef4444; cursor: pointer; padding: 4px 8px; border-radius: 6px;
            transition: all 0.2s; font-size: 13px;
        }
        .btn-delete:hover { background: #fef2f2; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-900 via-blue-800 to-indigo-900 text-white py-8">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold">📈 每日熱門股票前五名</h1>
                    <p class="text-blue-200 text-sm mt-1">金鑫體系投資觀察記錄</p>
                </div>
                <div class="text-right">
                    <div id="todayDisplay" class="text-lg font-semibold"></div>
                    <div class="text-blue-300 text-xs">今天</div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 py-8 space-y-6">

        <!-- 輸入區 -->
        <div class="card p-6">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-lg font-bold text-gray-800">📝 今日登記</h2>
                <input type="date" id="dateInput" class="border rounded-lg px-3 py-2 text-sm">
            </div>

            <div id="inputContainer" class="space-y-3">
                <!-- 5個輸入框由JS生成 -->
            </div>

            <div class="mt-5 flex gap-3">
                <button onclick="saveToday()" class="btn-primary">💾 儲存今日記錄</button>
                <button onclick="clearInputs()" class="px-4 py-3 rounded-xl border border-gray-300 text-gray-600 hover:bg-gray-50 transition font-medium">清空</button>
            </div>

            <div id="saveMsg" class="mt-3 text-sm font-medium hidden"></div>
        </div>

        <!-- 統計儀表板 -->
        <div class="grid grid-cols-3 gap-4">
            <div class="card p-4 text-center">
                <div class="text-3xl font-bold text-blue-600" id="totalDays">0</div>
                <div class="text-gray-500 text-sm mt-1">已記錄天數</div>
            </div>
            <div class="card p-4 text-center">
                <div class="text-3xl font-bold text-amber-500" id="totalStocks">0</div>
                <div class="text-gray-500 text-sm mt-1">總登記股數</div>
            </div>
            <div class="card p-4 text-center">
                <div class="text-3xl font-bold text-emerald-600" id="todayRecorded" style="font-size:28px;">❌</div>
                <div class="text-gray-500 text-sm mt-1">今日是否登記</div>
            </div>
        </div>

        <!-- 歷史記錄 -->
        <div class="card p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800">📊 歷史記錄</h2>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="px-3 py-2 rounded-lg bg-gray-100 text-gray-600 text-sm hover:bg-gray-200 transition">📥 匯出JSON</button>
                    <button onclick="document.getElementById('importFile').click()" class="px-3 py-2 rounded-lg bg-gray-100 text-gray-600 text-sm hover:bg-gray-200 transition">📤 匯入JSON</button>
                    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(this)">
                    <button onclick="clearAll()" class="px-3 py-2 rounded-lg bg-red-50 text-red-500 text-sm hover:bg-red-100 transition">🗑️ 全部清除</button>
                </div>
            </div>

            <div id="historyContainer">
                <div class="text-center text-gray-400 py-10">尚無記錄，請先登記今日熱門股！</div>
            </div>
        </div>

        <!-- 熱門股票統計 -->
        <div class="card p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">🏆 熱門股票累積排行</h2>
            <div id="statsContainer">
                <div class="text-center text-gray-400 py-6">尚無統計資料</div>
            </div>
        </div>

        <!-- 頁尾 -->
        <footer class="text-center text-gray-400 text-sm py-6">
            金鑫體系 © 2026 | 資料儲存於本機瀏覽器
        </footer>
    </div>

    <script>
        // === 資料儲存 (LocalStorage) ===
        const STORAGE_KEY = 'dailyTopStocks_v1';

        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return {};
            try { return JSON.parse(raw); } catch(e) { return {}; }
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        let stockData = loadData();

        // === 初始化日期 ===
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        document.getElementById('dateInput').value = todayStr;
        document.getElementById('todayDisplay').textContent = `${today.getMonth()+1}月${today.getDate()}日`;

        // === 生成5個輸入框 ===
        const inputContainer = document.getElementById('inputContainer');
        for (let i = 1; i <= 5; i++) {
            inputContainer.innerHTML += `
                <div class="input-group flex items-center gap-3">
                    <div class="rank-badge rank-${i}">${i}</div>
                    <input type="text" id="stock${i}" placeholder="股票代號或名稱 (如: 2330 台積電)"
                        class="flex-1 border rounded-xl px-4 py-3 text-base transition-all">
                </div>
            `;
        }

        // === 儲存今日記錄 ===
        function saveToday() {
            const date = document.getElementById('dateInput').value;
            if (!date) { showMsg('請選擇日期', 'error'); return; }

            const stocks = [];
            for (let i = 1; i <= 5; i++) {
                const val = document.getElementById(`stock${i}`).value.trim();
                if (val) stocks.push({ rank: i, name: val });
            }

            if (stocks.length === 0) { showMsg('請至少輸入一檔股票', 'error'); return; }

            stockData[date] = {
                date: date,
                stocks: stocks,
                createdAt: new Date().toISOString()
            };

            saveData(stockData);
            showMsg(`✅ 已儲存 ${date} 的記錄（${stocks.length} 檔）`, 'success');
            renderAll();
        }

        function showMsg(text, type) {
            const el = document.getElementById('saveMsg');
            el.textContent = text;
            el.className = 'mt-3 text-sm font-medium fade-in ' + (type === 'error' ? 'text-red-500' : 'text-emerald-600');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function clearInputs() {
            for (let i = 1; i <= 5; i++) document.getElementById(`stock${i}`).value = '';
        }

        // === 渲染所有內容 ===
        function renderAll() {
            renderHistory();
            renderStats();
            updateDashboard();
        }

        // === 儀表板 ===
        function updateDashboard() {
            const dates = Object.keys(stockData).sort();
            document.getElementById('totalDays').textContent = dates.length;

            let total = 0;
            dates.forEach(d => total += stockData[d].stocks.length);
            document.getElementById('totalStocks').textContent = total;

            const todayRecorded = stockData[todayStr] ? '✅' : '❌';
            const el = document.getElementById('todayRecorded');
            el.textContent = todayRecorded;
            el.className = stockData[todayStr]
                ? 'text-3xl font-bold text-emerald-600'
                : 'text-3xl font-bold text-gray-400';
        }

        // === 歷史記錄表格 ===
        function renderHistory() {
            const container = document.getElementById('historyContainer');
            const dates = Object.keys(stockData).sort().reverse();

            if (dates.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-10">尚無記錄，請先登記今日熱門股！</div>';
                return;
            }

            let html = '<div class="space-y-3">';
            dates.forEach(date => {
                const record = stockData[date];
                const stocksHtml = record.stocks.map(s => `
                    <span class="inline-flex items-center gap-1 bg-blue-50 text-blue-700 px-2 py-1 rounded-md text-sm font-medium">
                        <span class="w-5 h-5 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center">${s.rank}</span>
                        ${escapeHtml(s.name)}
                    </span>
                `).join('');

                html += `
                    <div class="history-row border rounded-xl p-4 flex items-center justify-between fade-in">
                        <div>
                            <div class="font-bold text-gray-800 mb-2">${date}</div>
                            <div class="flex flex-wrap gap-2">${stocksHtml}</div>
                        </div>
                        <button onclick="deleteRecord('${date}')" class="btn-delete">刪除</button>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function deleteRecord(date) {
            if (!confirm(`確定要刪除 ${date} 的記錄嗎？`)) return;
            delete stockData[date];
            saveData(stockData);
            renderAll();
        }

        // === 熱門股票累積排行 ===
        function renderStats() {
            const container = document.getElementById('statsContainer');
            const counts = {};

            Object.values(stockData).forEach(record => {
                record.stocks.forEach(s => {
                    const name = s.name.trim();
                    if (!counts[name]) counts[name] = { count: 0, dates: [] };
                    counts[name].count++;
                    counts[name].dates.push(record.date);
                });
            });

            const sorted = Object.entries(counts).sort((a,b) => b[1].count - a[1].count);

            if (sorted.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-6">尚無統計資料</div>';
                return;
            }

            let html = '<div class="space-y-2">';
            sorted.slice(0, 15).forEach((item, idx) => {
                const [name, info] = item;
                const width = Math.min(100, (info.count / sorted[0][1].count) * 100);
                html += `
                    <div class="flex items-center gap-3">
                        <div class="w-6 text-center font-bold text-gray-500">${idx+1}</div>
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-medium text-gray-800">${escapeHtml(name)}</span>
                                <span class="text-sm text-gray-500">${info.count} 次</span>
                            </div>
                            <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full" style="width: ${width}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // === 匯出 / 匯入 ===
        function exportData() {
            const blob = new Blob([JSON.stringify(stockData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `daily-top-stocks-${todayStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (typeof data !== 'object') throw new Error('格式錯誤');
                    const count = Object.keys(data).length;
                    if (!confirm(`確定匯入 ${count} 天的記錄？這會覆蓋現有資料！`)) return;
                    stockData = data;
                    saveData(stockData);
                    renderAll();
                    showMsg(`✅ 已匯入 ${count} 天記錄`, 'success');
                } catch(err) {
                    alert('匯入失敗：檔案格式錯誤');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        function clearAll() {
            if (!confirm('確定要刪除所有記錄嗎？此動作無法復原！')) return;
            stockData = {};
            saveData(stockData);
            renderAll();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // === 啟動 ===
        renderAll();
    </script>
</body>
</html>
